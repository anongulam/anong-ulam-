<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anong Ulam Natin?</title>
    <style>
        /* CSS Variables - Defined for colors used throughout the app */
        :root {
            /* Changed background gradient to use the logo with a subtle overlay */
            --bg-gradient: linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)), url('logo.png');
            --text-main: #2d3436;
            --text-muted: #636e72;
            /* Changed primary button colors to a vibrant food-friendly green */
            --primary: #2ed573;
            --primary-hover: #26af5f;
            --accent-pink: #ff4757;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 15px;
        }

        .app-logo {
            max-width: 120px;
            height: auto;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 
                        0 1px 3px rgba(0, 0, 0, 0.04);
            max-width: 440px;
            width: 100%;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        header h1 {
            color: var(--text-main);
            font-size: 2rem;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0 0 25px 0;
            line-height: 1.5;
        }

        /* --- Category Filter Section --- */
        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 25px;
            background: #f1f2f6;
            padding: 6px;
            border-radius: 16px;
        }

        .filter-option {
            flex: 1 1 calc(33.33% - 8px);
            min-width: 80px;
            position: relative;
        }

        .filter-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .filter-option label {
            display: block;
            padding: 10px 4px;
            background: transparent;
            color: var(--text-muted);
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            user-select: none;
            white-space: nowrap;
        }

        .filter-option input[type="radio"]:checked + label {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Disable filters while rolling */
        .filter-container.disabled {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Premium Result Card */
        .display-card {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 18px;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            padding: 10px 20px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02), 
                        0 10px 20px rgba(46, 213, 115, 0.05);
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .display-card.rolling {
            border-color: rgba(46, 213, 115, 0.3);
            background: #fbfdfc;
            transform: scale(0.98);
        }

        .display-card.success {
            border-color: #2ed573;
            background: #f1fcf4;
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(46, 213, 115, 0.15);
        }

        #label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 700;
        }

        #result {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
            transition: color 0.2s ease;
            text-align: center;
        }

        .success #result {
            color: #1e7e34;
        }

        /* Modern CTA Button */
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(46, 213, 115, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(46, 213, 115, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: 0 4px 10px rgba(46, 213, 115, 0.3);
        }

        button:disabled {
            background-color: #ced6e0;
            color: #a4b0be;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Footer styling for extra legitimacy */
        .footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="logo.png" alt="Anong Ulam Natin Logo" class="app-logo" onerror="this.style.display='none'">
    </div>

    <header>
        <h1>Anong ulam natin?</h1>
        <p>Nahihirapan ka ba mag-isip ng ulam? Ako pipili para sa'yo.</p>
    </header>

    <div class="filter-container" id="filterContainer">
        <div class="filter-option">
            <input type="radio" id="all" name="category" value="all" checked>
            <label for="all">All</label>
        </div>
        <div class="filter-option">
            <input type="radio" id="pork" name="category" value="pork">
            <label for="pork">Pork</label>
        </div>
        <div class="filter-option">
            <input type="radio" id="beef" name="category" value="beef">
            <label id="beefLabel" for="beef">Beef</label>
        </div>
        <div class="filter-option">
            <input type="radio" id="chicken" name="category" value="chicken">
            <label for="chicken">Chicken</label>
        </div>
        <div class="filter-option">
            <input type="radio" id="seafood" name="category" value="seafood">
            <label for="seafood">Seafood</label>
        </div>
        <div class="filter-option">
            <input type="radio" id="veg" name="category" value="veg">
            <label for="veg">Veggie</label>
        </div>
    </div>

    <div class="display-card" id="card">
        <div id="label">Suggested Dish</div>
        <div id="result">hmmm?</div>
    </div>

    <button id="spinBtn">
        <span>Click here!</span>
    </button>
    
    <div class="footer">Version 2.0 • Made for Hungry People</div>
</div>

<script>
    // Food choices structured with category mappings
    const foodChoices = [
        // Pork
        { name: "🥩 Pork steak", category: "pork" },
        { name: "🥣 Sinigang na baboy", category: "pork" },
        { name: "🍗 Adobong puti", category: "pork" },
        { name: "🍗 Adobong baboy", category: "pork" }, 
        { name: "🥥 Adobo sa gata", category: "pork" },
        { name: "🍲 Igado", category: "pork" },
        { name: "🧆 Stir fry Pork ribs", category: "pork" },
        { name: "🍖 Baby back ribs", category: "pork" }, 
        { name: "🥘 Kare kare lechon kawali", category: "pork" },
        { name: "🥩 Breaded Porkchop", category: "pork" },
        { name: "🧆 Tokwat baboy", category: "pork" }, 
        { name: "🍛 Bicol express", category: "pork" },
        { name: "🥩 Tapang taal", category: "pork" },
        // Beef
        { name: "🥩 Beef steak", category: "beef" },
        { name: "🥩 Ribeye Steak", category: "beef" },
        { name: "🥘 Kare kare balat/tuwalya", category: "beef" },
        { name: "🥘 Beef Caldereta", category: "beef" }, 
        { name: "🥦 Beef broccoli", category: "beef" },
        { name: "🔥 Beef Bulgogi", category: "beef" },
        { name: "🥩 Beef Tapa", category: "beef" }, <a href="https://youtube.com/shorts/PzmWApSdyP0?si=qi-b6I2iiveNmbS-"_blank">Watch our video on YouTube</a>
        { name: "🍳 Burger steak", category: "beef" },
        { name: "🍜 La paz batchoy", category: "beef" },
        // Chicken
        { name: "🍲 Tinola", category: "chicken" },
        { name: "🍌 Chicken pastil", category: "chicken" },
        { name: "🍗 Fried chicken", category: "chicken" },
        { name: "🥩 Chicken Fillet", category: "chicken" }, 
        { name: "🍍 Pininyahang manok", category: "chicken" },
        { name: "🥘 Chicken curry", category: "chicken" },
        { name: "🍗 Karaage", category: "chicken" },
        // Seafood
        { name: "🥣 Sinigang na salmon", category: "seafood" },
        { name: "🐟 Baked Salmon", category: "seafood" },
        { name: "🐟 Fried Tilapia", category: "seafood" },
        { name: "🦑 Adobo Pusit", category: "seafood" }, 
        { name: "🍤 Buttered shrimp", category: "seafood" },
        { name: "🦀 Alimango", category: "seafood" },
        { name: "🐟 GG small", category: "seafood" },
        { name: "🐟 Tuna panga", category: "seafood" },
        { name: "🐟 Tuna belly", category: "seafood" },
        // Vegetables
        { name: "🥘 Munggo", category: "veg" },
        { name: "🌱 Toge", category: "veg" },
        { name: "🥗 Cabbage carrots with egg", category: "veg" },
        { name: "🍛 Chop suey", category: "veg" }, 
        { name: "🥒 Ampalaya", category: "veg" },
        { name: "🍳 Tortang talong", category: "veg" },
        { name: "🌱 Adobong sitaw", category: "veg" },
        { name: "🥔 Mashed potato", category: "veg" },
        // Breakfast/Canned
        { name: "🥫 Corned beef", category: "beef" },
        { name: "🥓 Tocino", category: "pork" },
        { name: "🥓 Bacon", category: "pork" },
        { name: "🌭 Hotdog", category: "pork" },
        { name: "🌭 Dali sausage", category: "pork" }, 
        { name: "🥫 Rose bowl sardines", category: "seafood" },
        { name: "🥫 Century tuna", category: "seafood" },
        { name: "🥫 Spanish sardines", category: "seafood" }
    ];

    const resultDiv = document.getElementById("result");
    const cardDiv = document.getElementById("card");
    const button = document.getElementById("spinBtn");
    const labelDiv = document.getElementById("label");
    const filterContainer = document.getElementById("filterContainer");

    button.addEventListener("click", () => {
        // Get currently selected filter category
        const selectedCategory = document.querySelector('input[name="category"]:checked').value;

        // Filter dishes accordingly
        const filteredChoices = selectedCategory === "all" 
            ? foodChoices 
            : foodChoices.filter(item => item.category === selectedCategory);

        // Reset states
        button.disabled = true;
        filterContainer.classList.add("disabled"); // Lock filters during execution
        cardDiv.classList.remove("success");
        cardDiv.classList.add("rolling");
        labelDiv.innerText = "Choosing your meal...";
        
        let counter = 0;
        let speed = 60; // Smooth initial rolling speed
        
        const interval = setInterval(() => {
            const tempRandom = filteredChoices[Math.floor(Math.random() * filteredChoices.length)].name;
            resultDiv.innerText = tempRandom;
            counter++;
            
            if (counter > 18) {
                clearInterval(interval);
                
                // Final selection
                const finalChoice = filteredChoices[Math.floor(Math.random() * filteredChoices.length)].name;
                resultDiv.innerText = finalChoice;
                
                // Trigger success visual state
                cardDiv.classList.remove("rolling");
                cardDiv.classList.add("success");
                labelDiv.innerText = "Your Dish Today! 🎉";
                
                button.disabled = false;
                filterContainer.classList.remove("disabled"); // Re-enable filters
            }
        }, speed);
    });
</script>

</body>
</html>
