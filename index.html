<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What Should I Eat?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 8px; }
        p { color: #666; margin-bottom: 30px; }
        #result {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff4757;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            border: 2px dashed #ffeaa7;
            border-radius: 8px;
            background: #fffdf6;
            padding: 0 15px;
        }
        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s;
            width: 100%;
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <h1>Anong ulam natin?</h1>
    <p>Nahihirapan ka ba mag isip ng ulam? click na!</p>
    <div id="result">Sagot ko na ulam mo..</div>
    <button id="spinBtn">Click here!</button>
</div>

<script>
    // Updated food list based on your complete selection
    const foodChoices = [
        // Pork
        "🥩 Pork steak",
        "🥣 Sinigang na baboy",
        "🍗 Adobong puti",
        "🍗 Adobong baboy",
        "🥥 Adobo sa gata",
        "🍲 Igado",
        "🧆 Stir fry Pork ribs",
        "🍖 Baby back ribs",
        "🥘 Kare kare lechon kawali",
        "🥩 Breaded Porkchop",
        "🧆 Tokwat baboy",
        "🍛 Bicol express",
        "🥩 Tapang taal",

        // Beef
        "🥩 Beef steak",
        "🥩 Ribeye Steak",
        "🥘 Kare kare balat/tuwalya",
        "🥘 Beef Caldereta",
        "🥦 Beef broccoli",
        "🔥 Beef Bulgogi",
        "🥩 Beef Tapa",
        "🍳 Burger steak",
        "🍜 La paz batchoy",

        // Chicken
        "🍲 Tinola",
        "🍌 Chicken pastil",
        "🍗 Fried chicken",
        "🥩 Chicken Fillet",
        "🍍 Pininyahang manok",
        "🥘 Chicken curry",
        "🍗 Karaage",

        // Seafood
        "🥣 Sinigang na salmon",
        "🐟 Baked Salmon",
        "🐟 Fried Tilapia",
        "🦑 Adobo Pusit",
        "🍤 Buttered shrimp",
        "🦀 Alimango",
        "🐟 GG small",
        "🐟 Tuna panga",
        "🐟 Tuna belly",

        // Vegetables & Sides
        "🥘 Munggo",
        "🌱 Toge",
        "🥗 Cabbage carrots with egg",
        "🍛 Chop suey",
        "🥒 Ampalaya",
        "🍳 Tortang talong",
        "🌱 Adobong sitaw",
        "🥔 Mashed potato",

        // Breakfast & Canned Goods
        "🥫 Corned beef",
        "🥓 Tocino",
        "🥓 Bacon",
        "🌭 Hotdog",
        "🌭 Dali sausage",
        "🥫 Rose bowl sardines",
        "🥫 Century tuna",
        "🥫 Spanish sardines"
    ];

    const resultDiv = document.getElementById("result");
    const button = document.getElementById("spinBtn");

    button.addEventListener("click", () => {
        button.disabled = true;
        let counter = 0;
        
        const interval = setInterval(() => {
            const tempRandom = foodChoices[Math.floor(Math.random() * foodChoices.length)];
            resultDiv.innerText = tempRandom;
            counter++;
            
            if (counter > 15) {
                clearInterval(interval);
                const finalChoice = foodChoices[Math.floor(Math.random() * foodChoices.length)];
                resultDiv.innerText = finalChoice;
                button.disabled = false;
            }
        }, 80);
    });
</script>

</body>
</html>
