<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What Should I Eat?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 8px; }
        p { color: #666; margin-bottom: 30px; }
        #result {
            font-size: 2rem;
            font-weight: bold;
            color: #ff4757;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            border: 2px dashed #ffeaa7;
            border-radius: 8px;
            background: #fffdf6;
        }
        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s;
            width: 100%;
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <h1>Anong ulam natin?</h1>
    <p>Nahihirapan ka ba mag isip ng ulam? click na!</p>
    <div id="result">Click Spin!</div>
    <button id="spinBtn">Spin the Wheel</button>
</div>

<script>
    const foodChoices = [
        // 1 - 30 (Previous Items)
        "🥣 Sinigang na Baboy", "🥩 Beef Steak", "🍗 Chicken Fingers", "🍳 Corned Beef", "🍟 Fried Chicken", 
        "🐟 Baked Salmon", "🐟 Fried Tilapia", "🍔 Angel's Burger", "🥩 Premium Steak", "🍝 Spaghetti",
        "🍗 Pork Adobo", "🥘 Chicken Afritada", "🍲 Pork Menudo", "🍛 Kare-Kare", "🔥 Sizzling Sisig", 
        "🥣 Sinigang na Hipon", "🍲 Lechon Kawali", "🍢 Pork BBQ", "🥣 Chicken Tinola", "🥞 Tortang Talong",
        "🍛 Bicol Express", "🥬 Pinakbet", "🍜 Pancit Canton", "🧆 Shanghai Lumpia", "🍲 Bulalo", 
        "🐷 Crispy Pata", "🍛 Ginataang Kalabasa", "🍲 Dinuguan", "🥘 Caldereta", "🐟 Paksiw na Bangus",

        // 31 - 50 (Previous Items)
        "🍳 Beef Tapsilog", "🐷 Pork Tocilog", "🌭 Longganisa", "🍲 Pork Adobo sa Gata", "🥘 Chicken Pastel", 
        "🍲 Mechado", "🍛 Inihaw na Liempo", "🥣 Arroz Caldo", "🥣 Goto", "🥢 Tokwa't Baboy", 
        "🍜 Pancit Malabon", "🍜 Pancit Bihon", "🥘 Ginisang Munggo", "🍆 Ginisang Ampalaya", "🥟 Lumpiang Sariwa", 
        "🐟 Inihaw na Bangus", "🍗 Chicken Inasal", "🥘 Laing", "🥓 Lechon Paksiw", "🍛 Chopsuey",

        // 51 - 75 (New Additions)
        "🐷 Pork Estofado",
        "🥘 Chicken Curry",
        "🍲 Hamonado",
        "🥣 Sinampalukang Manok",
        "🥩 Beef Pares",
        "🍲 Beef Laya",
        "🍲 Papaitan",
        "🍲 Pochero",
        "🥘 Embutido",
        "🧆 Hardinera",
        "🍢 Inihaw na Isaw",
        "🥚 Kwek-Kwek / Tokneneng",
        "🍢 Fishballs / Squidballs",
        "🥟 Lumpiang Togue",
        "🥞 Ukoy (Shrimp Fritters)",
        "🍤 Camaron Rebosado",
        "🐟 Daing na Bangus",
        "🦑 Adobong Pusit",
        "🔥 Sizzling Gambas",
        "🦑 Crispy Calamares",
        "🥬 Gising-Gising",
        "🥗 Ensaladang Talong",
        "🍳 Bangsilog",
        "🍳 Spamsilog",
        "🍳 Chiksilog",

        // 76 - 100 (New Additions & Merienda/Dessert Options)
        "🍳 Hotdogsilog",
        "🍔 Burger Steak",
        "🥪 Cheesy Ham Sandwich",
        "🍲 Sopas",
        "🥣 Misua Patola Soup",
        "🥣 Odong Noodles",
        "🍜 Pancit Palabok",
        "🍜 Pancit Habhab",
        "🍜 Lomi",
        "🥣 Batchoy",
        "🍛 Lechon Manok",
        "🐖 Liempo Turon",
        "🍌 Fried Banana Cue",
        "🍠 Camote Cue",
        "🥞 Maruya",
        "🥖 Turon con Kasuy",
        "🍧 Halo-Halo",
        "🍮 Leche Flan",
        "🪵 Puto Bumbong",
        "🥥 Bibingka",
        "🌽 Maja Blanca",
        "🥣 Ginataang Bilo-Bilo",
        "🥣 Champorado",
        "🥭 Mango Float",
        "🥗 Buko Pandan Salad"
    ];

    // Select the elements from the document
    const resultDiv = document.getElementById("result");
    const button = document.getElementById("spinBtn");

    // Connect the click action safely via JavaScript
    button.addEventListener("click", () => {
        button.disabled = true;
        let counter = 0;
        
        const interval = setInterval(() => {
            const tempRandom = foodChoices[Math.floor(Math.random() * foodChoices.length)];
            resultDiv.innerText = tempRandom;
            counter++;
            
            if (counter > 15) {
                clearInterval(interval);
                const finalChoice = foodChoices[Math.floor(Math.random() * foodChoices.length)];
                resultDiv.innerText = finalChoice;
                button.disabled = false;
            }
        }, 80);
    });
</script>

</body>
</html>
